<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 2-Year Memory</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #ff2d55; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* --- LOCK SCREEN --- */
        #lock { position: fixed; inset: 0; background: #000; z-index: 10; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
        input { padding: 15px; border-radius: 12px; border: 2px solid #333; background: #111; color: white; width: 70%; text-align: center; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--main); }
        .btn { margin-top: 20px; padding: 12px 40px; background: var(--main); border: none; border-radius: 25px; color: white; font-weight: bold; box-shadow: 0 0 20px rgba(255,45,85,0.4); }

        /* --- MAIN APP --- */
        #app { display: none; text-align: center; width: 100%; opacity: 0; transition: 1s; }
        
        .photo-box {
            position: relative; width: 300px; height: 350px; background: white; margin: 0 auto;
            padding: 15px; padding-bottom: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: rotate(-3deg); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .photo-box:active { transform: scale(0.9) rotate(0deg); }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; opacity: 1; transition: 0.3s; }
        .caption { color: #333; margin-top: 15px; font-weight: bold; font-style: italic; }

        .progress-container { width: 200px; height: 6px; background: #333; margin: 30px auto; border-radius: 3px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--main); transition: 0.5s; }

        #final-msg { display: none; font-size: 1.2rem; padding: 20px; color: var(--main); animation: fadeIn 2s; line-height: 1.6; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="lock">
        <h2 style="letter-spacing: 3px;">SECRET SPACE</h2>
        <input type="text" id="pass" placeholder="လျှို့ဝှက်စကားလုံး...">
        <button class="btn" onclick="unlock()">OPEN</button>
    </div>

    <div id="app">
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <div class="photo-box" onclick="nextPhoto()">
            <img id="display-img" src="1.jpg" onerror="this.src='https://via.placeholder.com/300x350?text=Wait...'">
            <div class="caption" id="caption-text">ဒီနေ့လေးကိုမှတ်မိလား?</div>
        </div>

        <div id="final-msg">
            ❤️ တို့တွေပြန်မဆုံဖြစ်တာ ၁နှစ်ပြည်တော့မယ် အချိန်တိုင်းသတိရတယ်ကွာ<br>
            ပြန်ဆုံကြရအောင် သူငယ်ချင်းတို့!
        </div>
        
        <audio id="music" src="ကျောင်းတော်ကြီး.mp3" loop></audio>
    </div>

<script>
    // --- (၁) Global Variables & Back Button Logic ---
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function () {
        window.history.pushState(null, null, window.location.href);
    };

    const memoryData = [
        { img: "1.jpg", text: "ဒီနေ့လေးကို မှတ်မိလား? ❤️" },
        { img: "2.jpg", text: "ငါတို့တွေ အတူရယ်ခဲ့ကြတာ..." },
        { img: "3.jpg", text: "အဝေးမှာဆိုပေမဲ့ သတိရတယ်" },
        { img: "4.jpg", text: "တစ်စက္ကန့်လေးတောင် မမေ့ဘူး" },
        { img: "5.jpg", text: "နောက်ဆုံးပုံလေးပဲ... ပြန်ဆုံကြရအောင်!" }
    ];

    let currentIndex = -1; 

    // --- (၂) Unlock Function ---
    function unlock() {
        const secret = "တင်ဝင်းကြိုင်"; 
        const input = document.getElementById("pass").value.trim(); // .toLowerCase() ကို ဗမာစာအတွက် ဖြုတ်ထားသည်

        if(input === secret) {
            // Unlock ဖြစ်တာနဲ့ သီချင်းဖွင့်မယ်
            document.getElementById("music").play();
            
            document.getElementById("lock").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("lock").style.display = "none";
                document.getElementById("app").style.display = "block";
                setTimeout(() => { document.getElementById("app").style.opacity = "1"; }, 100);
                
                // ပထမဆုံးပုံကို စတင်ပြသမယ်
                nextPhoto(); 
            }, 800);
        } else {
            alert("မှားနေတယ် သူငယ်ချင်း!");
        }
    }

    // --- (၃) Next Photo Function ---
    function nextPhoto() {
        const imgTag = document.getElementById("display-img");
        const capTag = document.getElementById("caption-text");
        const bar = document.getElementById("progress-bar");

        if(currentIndex < memoryData.length - 1) {
            currentIndex++; 
            
            // Photo transition (Fade)
            imgTag.style.opacity = "0";
            
            setTimeout(() => {
                imgTag.src = memoryData[currentIndex].img;
                capTag.innerText = memoryData[currentIndex].text;
                imgTag.style.opacity = "1";
                
                // Progress Bar Update
                bar.style.width = ((currentIndex + 1) / memoryData.length * 100) + "%";
                
                // Confetti Effect
                confetti({ particleCount: 30, spread: 40, origin: { y: 0.8 }, colors: ['#ff2d55', '#fff'] });
            }, 300);

        } else {
            // အကုန်ကြည့်ပြီးရင် ပြမယ့် Message
            document.querySelector(".photo-box").style.display = "none";
            document.querySelector(".progress-container").style.display = "none";
            document.getElementById("final-msg").style.display = "block";
            
            // Final Confetti Shower
            var duration = 5 * 1000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }
    }
</script>
</body>
</html>
